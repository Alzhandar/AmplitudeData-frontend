services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amplitude_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      BACKEND_BASE_URL: https://avametric.online
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
